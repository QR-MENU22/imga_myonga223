<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOUL | The Royal Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --bg: #050505;
            --card-bg: rgba(25, 25, 25, 0.7);
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg);
            /* Ард талын тансаг дэвсгэр зураг */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1534422298391-e4f8c170db06?q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text);
        }

        /* Luxury Header */
        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo-line { width: 60px; height: 2px; background: var(--gold); margin: 10px 0; }
        
        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            color: var(--gold); 
            letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        header p { 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            color: var(--dim); 
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Sticky Navigation */
        .nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 0;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .cat-btn {
            background: none;
            border: none;
            color: var(--dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            padding: 5px 0;
        }

        .cat-btn.active { color: var(--gold); }
        .cat-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 1px;
            background: var(--gold);
            transition: 0.4s;
            transform: translateX(-50%);
        }
        .cat-btn.active::after { width: 100%; }

        /* Menu Grid */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 10 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .food-card {
            background: var(--card-bg);
            border-radius: 0px; /* Luxury look often uses sharp edges or very slight round */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .food-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid var(--gold);
            opacity: 0;
            transition: 0.5s;
            pointer-events: none;
            transform: scale(1.05);
        }

        .food-card:hover {
            transform: translateY(-10px);
            background: rgba(30, 30, 30, 0.9);
        }

        .food-card:hover::before {
            opacity: 0.4;
            transform: scale(1);
        }

        .img-box {
            width: 100%;
            height: 280px;
            overflow: hidden;
            position: relative;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.8s;
            filter: grayscale(20%);
        }

        .food-card:hover .img-box img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .info { padding: 25px; text-align: center; }
        
        .food-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .price {
            display: block;
            color: var(--gold);
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .line {
            width: 40px; height: 1px; background: var(--gold);
            margin: 0 auto 15px;
            opacity: 0.5;
        }

        .desc {
            font-size: 0.8rem;
            color: var(--dim);
            font-weight: 300;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        .hidden { display: none !important; }

        footer {
            padding: 100px 20px 50px;
            text-align: center;
            opacity: 0.5;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; letter-spacing: 8px; }
            .categories { gap: 15px; }
            .cat-btn { font-size: 0.7rem; }
            .container { gap: 25px; }
        }
    </style>
</head>

    const menuDisplay = document.getElementById('main-menu');

    function render() {

            <div class="food-card" data-category="${item.c}">
                <div class="img-box">

                    <div class="overlay"></div>

                    <div class="line"></div>
                    <p class="desc">${item.d}</p>
                </div>
            </div>
        `).join('');

    function filterMenu(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.querySelectorAll('.food-card').forEach(card => {
            if (cat === 'all' || card.getAttribute('data-category') === cat) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }
